server:
  port: ${PORT:9090}

spring:
  application:
    name: hvy-blog
  sql:
    init:
      mode: never # data.sql 실행
  datasource:
    url: jdbc:postgresql://${DB_URL:postgres:5432}/blog
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:motolies}
    password: ${DB_PASS:motolies!!}
    hikari:
      pool-name: blogHikariCP
      connection-timeout: 30000
      minimum-idle: 20
      maximum-pool-size: 50
      idle-timeout: 300000
      max-lifetime: 1800000
      auto-commit: true
      leak-detection-threshold: 5000
  jmx:
    default-domain: blog
  jpa:
    properties:
      hibernate:
        release_mode: AFTER_TRANSACTION
        dialect: org.hibernate.dialect.PostgreSQLDialect
        # JDBC 시간 바인딩을 UTC로 고정 — JVM 기본 타임존 변동에 대한 안전벨트 (timestamptz 전환 후에도 무해)
        jdbc:
          time_zone: UTC
      hypersistence:
        utils:
          enable_types_contributor: false
    hibernate:
      ddl-auto: validate
      naming.physical-strategy: kr.hvy.blog.infra.config.HvyPhysicalNamingStrategy
    defer-datasource-initialization: true
  servlet:
    multipart:
      max-file-size: 1GB
      max-request-size: 1GB
  jackson:
    deserialization:
      fail-on-unknown-properties: false
    serialization:
      indent-output: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      timeout: 3600
  cloud:
    stream:
      kafka:
        enabled: false # kafka 사용 여부

hvy:
  master-code:
    # 비인증 공개(/api/codes/tree/{rootCode})로 노출을 허용할 루트코드(쉼표구분, 대문자).
    # 미등록 루트는 구조조차 노출하지 않고 빈 목록을 반환한다.
    public-roots: ${MASTER_CODE_PUBLIC_ROOTS:FAVORITE}
  cors:
    # CORS 허용 오리진 패턴(쉼표구분). 기본 "*" 는 하위호환용이며,
    # 운영에서는 실제 프론트 도메인만 지정할 것을 권장(allowCredentials=true 와 "*" 조합은 과대 허용).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
  sql:
    datasource-wrapper:
      enable-wrapper: true
      format: true
      slow-query-threshold: 500
      data-source-names:
        - "dataSource"
      enable-result-set-logging: true  # ResultSet 테이블 로깅 활성화
      max-column-value-length: ${DB_WRAPPER_MAX_COLUMN_VALUE_LENGTH:200}
      max-param-value-length: ${DB_WRAPPER_MAX_PARAM_VALUE_LENGTH:500}  # SQL 파라미터 인라인 시 문자열 값 최대 길이

#Configure Mybatis
mybatis:
  type-aliases-package: kr.hvy.blog.modules,kr.hvy.common.mybatis.CountMapper # 많아지면 콤마로 구분
  type-handlers-package: kr.hvy.common.core.code.converter
  mapper-locations: classpath:mybatis-mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    call-setters-on-nulls: true
    jdbc-type-for-null: NULL

# log
logging:
  level:
    org.springframework:
      web: ERROR
    org.mybatis: DEBUG
    com.zaxxer:
        hikari: ERROR
        hikari.HikariConfig: DEBUG
    kr.hvy:
      common:
        infrastructure.database.logging: DEBUG
        aop.cache: DEBUG
      blog:
        service: TRACE
        controller: TRACE
        security: ERROR
        repository: TRACE
        mapper: TRACE
  logback:
    rollingpolicy:
      max-history: 7
      max-size: 10MB

# tracing
management:
  tracing:
    sampling:
      probability: 0.0

# jwt
jwt:
  header:
    name: Authorization
    prefix: Bearer
  secret: ${JWT_SECRET:jwt_secret_key!!@@longlongKey1234}
  expiration: 31449600
  refresh:
    expiration: 31449600

# file
path.upload: ${FILE_PATH:${user.home}/skyscape/file}

# slack
slack:
  token: ${SLACK_BOT_TOKEN:xoxb-xxxxxxxxxxxx-xxxxxxxxxxxx-xxxxxxxxxxxxxxxxxxxxxxxx}

# jira
jira:
  url: ${JIRA_URL:https://your-company.atlassian.net}
  username: ${JIRA_USERNAME:your-email@company.com}
  api-token: ${JIRA_API_TOKEN:your-api-token}
  project-key: ${JIRA_PROJECT_KEY:PROJECT}
  sync:
    batch-size: ${JIRA_SYNC_BATCH_SIZE:50}

# browserless (Chromium sidecar for Cloudflare-protected sites)
browser:
  content-url: ${BROWSER_CONTENT_URL:http://192.168.0.100:3030/content}

# scheduler
scheduler:
  public-ip:
    lock-name: PUBLIC-IP-TEST
    cron-expression: "0 0 0 * * ?"
  hotdeal:
    lock-name: HOTDEAL-TEST
    cron-expression: "*/10 * * * * ?"
  log-cleaner:
    lock-name: LOGCLEANER-TEST
    cron-expression: "*/10 * * * * ?"
  jira:
    lock-name: JIRA-SYNC-TEST
    cron-expression: "0 0 0 1 * ?"
  claude:
    lock-name: CLAUDE-REFRESH-TEST
    enabled: false

cookie:
  same-site: LAX
  secure: false

# cache
cache:
  logging:
    enabled: true           # 캐시 로깅 활성화 여부
    log-hits: true
    log-misses: true
    log-evictions: true

---
spring:
  config:
    activate:
      on-profile: prod
# tracing
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://zipkin:9411/api/v2/spans}
# cache
cache:
  logging:
    enabled: false
# scheduler
scheduler:
  public-ip:
    lock-name: PUBLIC-IP-PROD
    cron-expression: "0 * * * * ?"
  hotdeal:
    lock-name: HOTDEAL-PROD
    cron-expression: "0 */10 * * * ?"
  log-cleaner:
    lock-name: LOGCLEANER-PROD
    cron-expression: "* * 0 * * ?"
  jira:
    lock-name: JIRA-SYNC-PROD
    cron-expression: "0 0 * * * ?"
  claude:
    lock-name: CLAUDE-REFRESH-PROD
    enabled: true

cookie:
  same-site: NONE
  secure: true